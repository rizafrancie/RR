{% extends "base.html" %}

{% block content %}

<div class="container">
    <div class="card">
        <h2>Register</h2>

        <form method="POST">
            <input name="username" placeholder="Username">
            <input type="password" name="password" placeholder="Password">
            <button type="submit">註冊</button>
        </form>

        <button class="secondary" onclick="location.href='/login'">返回登入</button>
    </div>
</div>

{% endblock %}
