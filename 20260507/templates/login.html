<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screen1：歡迎登入</title>
    
    <style>
        /* 全域背景設定：溫暖奶油米色 */
        body { 
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Microsoft JhengHei", sans-serif;
            background-color: #FDFBF7;
            color: #1A1A1A;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }

        /* 標誌性：超大圓角純白主卡片 */
        .login-card {
            background-color: #FFFFFF;
            border: 1px solid #EFECE6;
            border-radius: 32px;
            padding: 40px;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.02);
            box-sizing: border-box;
        }

        /* 標題與文字區 */
        .login-title {
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            margin: 0 0 8px 0;
            letter-spacing: -0.025em;
        }
        .login-desc {
            font-size: 15px;
            color: #7A7A7A;
            text-align: center;
            margin: 0 0 35px 0;
            line-height: 1.5;
        }

        /* 表單元件 */
        .form-group {
            margin-bottom: 22px;
        }
        .form-label {
            display: block;
            font-size: 15px;
            font-weight: bold;
            margin-bottom: 8px;
            color: #1A1A1A;
        }
        .form-input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #D9D4C7;
            border-radius: 16px;
            background-color: #FCFCFA;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-input:focus {
            border-color: #1E5643;
            box-shadow: 0 0 0 3px rgba(30,86,67,0.08);
        }

        /* 主按鈕：森林深綠色 */
        .btn-green {
            width: 100%;
            background-color: #1E5643;
            color: #FFFFFF;
            border: none;
            padding: 14px 0;
            font-size: 16px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }
        .btn-green:hover {
            background-color: #153E30;
        }

        /* Flask 錯誤訊息提示條 */
        .alert-error {
            background-color: #FFF7ED;
            border: 1px solid #DE9E48;
            color: #C98A36;
            padding: 14px;
            border-radius: 16px;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 25px;
            text-align: center;
        }

        /* 下方切換連結區 */
        .footer-link {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #EFECE6;
            font-size: 14px;
            color: #7A7A7A;
        }
        .footer-link a {
            color: #DE9E48;
            font-weight: bold;
            text-decoration: none;
            margin-left: 5px;
        }
        .footer-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-card">
        
        <h2 class="login-title">歡迎回來</h2>
        <p class="login-desc">請輸入您的帳號密碼以進入 PWA 留言板</p>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="alert-error">
              {% for message in messages %}
                <div>⚠️ {{ message }}</div>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}
        
        <form method="POST">
            <div class="form-group">
                <label class="form-label">帳號</label>
                <input type="text" name="username" placeholder="請輸入帳號" required class="form-input">
            </div>
            
            <div class="form-group">
                <label class="form-label">密碼</label>
                <input type="password" name="password" placeholder="請輸入密碼" required class="form-input">
            </div>
            
            <button type="submit" class="btn-green">登入系統</button>
        </form>
        
        <div class="footer-link">
            還沒有帳號嗎？<a href="{{ url_for('register') }}">立即註冊</a>
        </div>
        
    </div>

</body>
</html>
